name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to fork
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git remote add fork https://x-access-token:${{ secrets.FORK_PAT }}@github.com/azraihan/Tweet-Composition-And-Publication.git
          git checkout -b sync-branch
          git rm -r --cached .github/workflows
          git commit -m "Sync: exclude workflows"
          git push fork sync-branch:main --force

      - name: Trigger Netlify deploy
        run: curl -X POST ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
